name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.9'

    # Wait until gradlew is committed, or we can use global gradle
    - name: Run Detekt
      run: gradle detekt

    - name: Run KtLint
      run: gradle ktlintCheck

    - name: Run Unit Tests
      run: gradle testDebugUnitTest

    - name: Build APK
      run: gradle assembleDebug
