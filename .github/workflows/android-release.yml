name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.9'

    # Note: For a real release, signing variables (keystore, passwords) need to be configured via secrets.
    # Currently running assembleRelease which will generate an unsigned APK or use a debug key depending on the config.
    - name: Build Release APK
      run: gradle assembleRelease

    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release-unsigned.apk autotrans-android-${{ github.ref_name }}.apk
      continue-on-error: true # Just in case it's named differently or signed

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          autotrans-android-${{ github.ref_name }}.apk
          app/build/outputs/apk/release/*.apk
        generate_release_notes: true
